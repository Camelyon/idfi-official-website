<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- ÜST: soldan(112,512) → sağa(912,512), sweep=0 = ÜST yay -->
    <path id="topArc" d="M 112 512 A 400 400 1 0 0 912 512" />
    <!-- ALT: soldan(112,512) → sağa(912,512), sweep=1 = ALT yay (düz okunur) -->
    <path id="botArc" d="M 112 512 A 400 350 1 0 1 912 512" />
  </defs>
  <rect width="1024" height="1024" fill="#000023"/>
  <circle cx="512" cy="512" r="448" fill="none" stroke="#f0b323" stroke-width="20"/>
  <!-- Üst: tam isim -->
  <text fill="#f0b323" font-family="Montserrat, Arial, Helvetica, sans-serif" font-weight="1000" font-size="199" letter-spacing="35">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">IDFI</textPath>
  </text>
  <!-- Merkez: minimal dünya/atlas -->
  <g stroke="#f0b323" stroke-width="24" fill="none" transform="translate(512,520)">
    <circle r="220"/>
    <ellipse rx="210" ry="110"/>
    <ellipse rx="110" ry="220"/>
    <path d="M -220 0 H 220"/>
    <path d="M 0 -220 V 220"/>
  </g>
  <!-- Alt: büyük IDFI -->
  <text fill="#f0b323" font-family="Montserrat, Arial, Helvetica, sans-serif" font-weight="1000" font-size="38" letter-spacing="19">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">INDEPENDENT DIGITAL FINANCE</textPath>
  </text>
</svg>
